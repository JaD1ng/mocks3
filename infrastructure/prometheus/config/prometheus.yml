global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - alertmanager:9093

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'consul'
    static_configs:
      - targets: ['consul:8500']
    metrics_path: '/v1/agent/metrics'
    params:
      format: ['prometheus']

  - job_name: 's3-api'
    static_configs:
      - targets: ['s3-api:8080']
    metrics_path: '/metrics'
    scrape_interval: 10s
    
  - job_name: 'metadata'
    static_configs:
      - targets: ['metadata:8081']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'storage'
    static_configs:
      - targets: ['storage:8082']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'task-processor'
    static_configs:
      - targets: ['task-processor:8083']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'chaos-engineering'
    static_configs:
      - targets: ['chaos-engineering:8084']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'admin-api'
    static_configs:
      - targets: ['admin-api:8090']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # PostgreSQL 监控
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
    scrape_interval: 30s

  # Redis 监控
  - job_name: 'redis-cache'
    static_configs:
      - targets: ['redis-exporter-cache:9121']
    scrape_interval: 15s

  - job_name: 'redis-queue'
    static_configs:
      - targets: ['redis-exporter-queue:9121']
    scrape_interval: 15s

  # Nginx 监控
  - job_name: 'nginx'
    static_configs:
      - targets: ['api-gateway:8080']
    metrics_path: '/metrics'
    scrape_interval: 15s

  # Node Exporter (系统监控)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 15s